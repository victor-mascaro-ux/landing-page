<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organization Settings — Knomee</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary-100: #240446;
      --primary-70:  #7639A1;
      --primary-10:  #e9d9f4;
      --accent-100:  #ea0000;
      --neutral-100: #000000;
      --neutral-90:  #757575;
      --neutral-20:  #e2e2e2;
      --border:      #e8e8e8;
      --bg-page:     #f4fdfb;
      --bg-sidebar:  #f6f6f6;
      --bg-white:    #ffffff;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      color: var(--neutral-100);
    }

    /* ── Navbar ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: var(--primary-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }
    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .navbar-logo svg { flex-shrink: 0; }
    .navbar-logo-text {
      font-size: 18px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.18px;
      text-transform: uppercase;
    }
    .navbar-logo-sub {
      font-size: 11px;
      font-weight: 600;
      color: white;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-left: 2px;
      opacity: 0.85;
    }
    .navbar-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      color: var(--primary-100);
      flex-shrink: 0;
    }

    /* ── Shell ── */
    .shell {
      display: flex;
      padding-top: 60px;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--bg-sidebar);
      border-radius: 24px;
      margin: 24px 0 24px 24px;
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      height: fit-content;
    }
    .sidebar-heading { }
    .sidebar-heading h1 {
      font-size: 32px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.32px;
    }
    .sidebar-heading p {
      font-size: 16px;
      font-weight: 400;
      color: var(--neutral-100);
      line-height: 1.5;
      margin-top: 4px;
    }
    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--neutral-100);
      transition: background 0.15s;
      border: none;
      background: transparent;
      text-align: left;
      width: 100%;
    }
    .nav-item:hover { background: #e8e8e8; }
    .nav-item.active {
      background: var(--neutral-20);
      font-weight: 600;
    }
    .nav-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--neutral-100);
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      margin: 24px 24px 24px 0;
      background: white;
      border-radius: 24px;
      padding: 38px 48px;
      min-height: calc(100vh - 60px - 48px);
    }
    .main-header {
      display: flex;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .main-header h2 {
      font-size: 24px;
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: -0.24px;
    }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 28px; }

    /* ── Form elements ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field-group label {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-70);
      line-height: 1.5;
    }
    .field-group input[type="text"],
    .field-group input[type="url"],
    .field-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--neutral-100);
      background: white;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
    }
    .field-group input[type="text"]:focus,
    .field-group input[type="url"]:focus,
    .field-group textarea:focus {
      border-color: var(--primary-70);
    }
    .field-hint {
      font-size: 12px;
      color: var(--neutral-90);
      line-height: 1.5;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-70);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    /* ── UTM checkboxes ── */
    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 24px;
      margin-bottom: 14px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
    }
    .checkbox-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary-70);
      cursor: pointer;
      flex-shrink: 0;
    }
    .custom-key-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .custom-key-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .custom-key-row input:focus { border-color: var(--primary-70); }
    .btn-add {
      padding: 10px 20px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--neutral-100);
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .btn-add:hover { border-color: var(--primary-70); background: var(--primary-10); }

    /* ── Advisors box ── */
    .advisors-box {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 24px;
    }

    /* ── Color pickers ── */
    .color-row {
      display: flex;
      gap: 32px;
    }
    .color-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .color-field label {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-70);
    }
    .color-input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      width: 200px;
      background: white;
    }
    .color-input-wrap:focus-within { border-color: var(--primary-70); }
    .color-swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }
    .color-swatch input[type="color"] {
      position: absolute;
      opacity: 0;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      cursor: pointer;
    }
    .color-hex {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      color: var(--neutral-100);
    }

    /* ── Save button ── */
    .btn-save {
      align-self: flex-end;
      padding: 12px 28px;
      background: var(--primary-100);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: var(--primary-70); }

    .divider {
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-logo">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="13" cy="13" r="12" stroke="white" stroke-width="1.5"/>
        <circle cx="13" cy="13" r="5" fill="white"/>
      </svg>
      <span class="navbar-logo-text">Knomee</span>
      <span class="navbar-logo-sub">Advisor</span>
    </div>
    <div class="navbar-avatar">A</div>
  </nav>

  <div class="shell">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-heading">
        <h1>Organization</h1>
        <p>Manage your organization settings.</p>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-tab="general" onclick="switchTab('general')">
          <span class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 6h8M5 9h8M5 12h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          General
        </button>
        <button class="nav-item" data-tab="prospects" onclick="switchTab('prospects')">
          <span class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/>
              <path d="M3 15c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          Prospects
        </button>
        <button class="nav-item" data-tab="branding" onclick="switchTab('branding')">
          <span class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="5.5" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="12.5" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="5.5" cy="12.5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="12.5" cy="12.5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </span>
          Branding
        </button>
        <button class="nav-item" data-tab="compliance" onclick="switchTab('compliance')">
          <span class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 2L3 5v5c0 3.5 2.5 6.5 6 7.5 3.5-1 6-4 6-7.5V5L9 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M6 9l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          Compliance
        </button>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- General Tab -->
      <section id="tab-general" class="tab-panel active">
        <div class="main-header">
          <h2>General</h2>
        </div>

        <div class="field-group">
          <label for="org-name">Name</label>
          <input type="text" id="org-name" value="Acme" placeholder="Organization name" />
        </div>

        <div class="field-group">
          <label for="scheduling-link">Scheduling Link</label>
          <input type="url" id="scheduling-link" value="https://AcmeAdvisors.com/schedule" placeholder="https://..." />
        </div>

        <div class="divider"></div>
        <button class="btn-save">Save Changes</button>
      </section>

      <!-- Prospects Tab -->
      <section id="tab-prospects" class="tab-panel">
        <div class="main-header">
          <h2>Prospects</h2>
        </div>

        <div>
          <p class="section-label">Allowed Prospect UTM Keys</p>
          <div class="checkbox-grid">
            <label class="checkbox-item"><input type="checkbox" /> utm_source</label>
            <label class="checkbox-item"><input type="checkbox" /> utm_medium</label>
            <label class="checkbox-item"><input type="checkbox" /> utm_campaign</label>
            <label class="checkbox-item"><input type="checkbox" /> utm_term</label>
            <label class="checkbox-item"><input type="checkbox" /> utm_content</label>
            <label class="checkbox-item"><input type="checkbox" /> utm_id</label>
            <label class="checkbox-item"><input type="checkbox" /> landing_page_url</label>
            <label class="checkbox-item"><input type="checkbox" /> referrer_url</label>
            <label class="checkbox-item"><input type="checkbox" /> first_touch_at</label>
            <label class="checkbox-item"><input type="checkbox" /> last_touch_at</label>
          </div>
          <div class="custom-key-row">
            <input type="text" placeholder="Add custom key" />
            <button class="btn-add">Add</button>
          </div>
        </div>

        <div class="divider"></div>

        <div>
          <p class="section-label">Prospect Visibility — Advisors</p>
          <div class="advisors-box">
            <label class="checkbox-item"><input type="checkbox" /> Advisor Test</label>
            <label class="checkbox-item"><input type="checkbox" /> New Advisor</label>
            <label class="checkbox-item"><input type="checkbox" /> Taylor Fah</label>
          </div>
        </div>

        <div class="divider"></div>
        <button class="btn-save">Save Changes</button>
      </section>

      <!-- Branding Tab -->
      <section id="tab-branding" class="tab-panel">
        <div class="main-header">
          <h2>Branding</h2>
        </div>

        <div class="color-row">
          <div class="color-field">
            <label>Primary Color</label>
            <div class="color-input-wrap">
              <div class="color-swatch" id="swatch-primary" style="background:#240446;">
                <input type="color" value="#240446" oninput="updateColor('primary', this.value)" />
              </div>
              <input class="color-hex" id="hex-primary" type="text" value="#240446" maxlength="7"
                oninput="updateColorFromHex('primary', this.value)" />
            </div>
          </div>

          <div class="color-field">
            <label>Accent Color</label>
            <div class="color-input-wrap">
              <div class="color-swatch" id="swatch-accent" style="background:#7639A1;">
                <input type="color" value="#7639A1" oninput="updateColor('accent', this.value)" />
              </div>
              <input class="color-hex" id="hex-accent" type="text" value="#7639A1" maxlength="7"
                oninput="updateColorFromHex('accent', this.value)" />
            </div>
          </div>
        </div>

        <div class="divider"></div>
        <button class="btn-save">Save Changes</button>
      </section>

      <!-- Compliance Tab -->
      <section id="tab-compliance" class="tab-panel">
        <div class="main-header">
          <h2>Compliance</h2>
        </div>

        <div class="field-group">
          <label for="consent-language">Consent Opt-In Language</label>
          <p class="field-hint" style="margin-bottom:4px;">To embed a link, use: <code>[link text](https://example.com)</code></p>
          <textarea id="consent-language" rows="6" placeholder="By signing up, I agree to receive communications from ..."></textarea>
        </div>

        <div class="divider"></div>
        <button class="btn-save">Save Changes</button>
      </section>

    </main>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
    }

    function updateColor(key, hex) {
      document.getElementById('swatch-' + key).style.background = hex;
      document.getElementById('hex-' + key).value = hex.toUpperCase();
    }

    function updateColorFromHex(key, value) {
      if (/^#[0-9A-Fa-f]{6}$/.test(value)) {
        document.getElementById('swatch-' + key).style.background = value;
        document.querySelector('#swatch-' + key + ' input[type=color]').value = value;
      }
    }
  </script>
</body>
</html>
