<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organization Settings — Knomee</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary-100: #240446;
      --primary-70:  #7639A1;
      --primary-10:  #e9d9f4;
      --accent-100:  #ea0000;
      --neutral-100: #000000;
      --neutral-90:  #757575;
      --neutral-20:  #e2e2e2;
      --border:      #e8e8e8;
      --bg-page:     #f4fdfb;
      --bg-sidebar:  #f6f6f6;
      --bg-white:    #ffffff;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      color: var(--neutral-100);
    }

    /* ── Navbar ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: var(--primary-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }
    .navbar-logo {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }
    .navbar-logo svg {
      height: 24px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }
    .navbar-logo-advisor {
      font-size: 18.5px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.18px;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 1px;
    }
    .navbar-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21.6px;
      font-weight: 600;
      color: var(--primary-100);
      letter-spacing: -0.22px;
      flex-shrink: 0;
    }

    /* ── Shell ── */
    .shell {
      display: flex;
      min-height: 100vh;
      align-items: stretch;
      padding: 84px 24px 24px 24px;
    }

    /* ── Card wrapper (gray + white as one unit) ── */
    .card {
      display: flex;
      flex: 1;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 4px 32px 0 rgba(0,0,0,0.12);
      align-items: stretch;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--bg-sidebar);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .sidebar-heading { }
    .sidebar-heading h1 {
      font-size: 32px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.32px;
    }
    .sidebar-heading p {
      font-size: 16px;
      font-weight: 400;
      color: var(--neutral-100);
      line-height: 1.5;
      margin-top: 4px;
    }
    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--neutral-100);
      transition: background 0.15s;
      border: none;
      background: transparent;
      text-align: left;
      width: 100%;
    }
    .nav-item:hover { background: #e8e8e8; }
    .nav-item.active {
      background: var(--neutral-20);
      font-weight: 600;
    }
    .nav-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--neutral-100);
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      background: white;
      padding: 38px 48px;
    }
    .main-header {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }
    .main-header h2 {
      font-size: 24px;
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: -0.24px;
    }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 16px; }

    /* ── Form elements ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field-group label {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-70);
      line-height: 1.5;
    }
    .field-group input[type="text"],
    .field-group input[type="url"],
    .field-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--neutral-100);
      background: white;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
    }
    .field-group input[type="text"]:focus,
    .field-group input[type="url"]:focus,
    .field-group textarea:focus {
      border-color: var(--primary-70);
    }
    .field-hint {
      font-size: 12px;
      color: var(--neutral-90);
      line-height: 1.5;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-70);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    /* ── UTM checkboxes ── */
    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 24px;
      margin-bottom: 14px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
    }
    .checkbox-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary-70);
      cursor: pointer;
      flex-shrink: 0;
    }
    .custom-key-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .custom-key-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .custom-key-row input:focus { border-color: var(--primary-70); }
    .btn-add {
      padding: 10px 20px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--neutral-100);
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .btn-add:hover { border-color: var(--primary-70); background: var(--primary-10); }

    /* ── Advisors box ── */
    .advisors-box {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 24px;
    }

    /* ── Color pickers ── */
    .color-row {
      display: flex;
      gap: 32px;
    }
    .color-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .color-field label {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-70);
    }
    .color-input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      width: 200px;
      background: white;
    }
    .color-input-wrap:focus-within { border-color: var(--primary-70); }
    .color-swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }
    .color-swatch input[type="color"] {
      position: absolute;
      opacity: 0;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      cursor: pointer;
    }
    .color-hex {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      color: var(--neutral-100);
    }

    /* ── Save button ── */
    .btn-save {
      align-self: flex-end;
      padding: 12px 28px;
      background: var(--primary-100);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: var(--primary-70); }

  </style>
</head>

          <label for="org-name">Name</label>
          <input type="text" id="org-name" value="Acme" placeholder="Organization name" />
        </div>

        <div class="field-group">

      <!-- Prospects Tab -->
      <section id="tab-prospects" class="tab-panel">
        <div class="main-header">
          <h2>Prospects</h2>

          <p class="section-label">Allowed Prospect UTM Keys</p>
          <div class="checkbox-grid">
            <label class="checkbox-item"><input type="checkbox" /> utm_source</label>
            <label class="checkbox-item"><input type="checkbox" /> utm_medium</label>
            <label class="checkbox-item"><input type="checkbox" /> utm_campaign</label>
            <label class="checkbox-item"><input type="checkbox" /> utm_term</label>

                <input type="color" value="#240446" oninput="updateColor('primary', this.value)" />
              </div>
              <input class="color-hex" id="hex-primary" type="text" value="#240446" maxlength="7"
                oninput="updateColorFromHex('primary', this.value)" />

          </div>

          <div class="color-field">
            <label>Accent Color</label>
            <div class="color-input-wrap">
              <div class="color-swatch" id="swatch-accent" style="background:#7639A1;">
                <input type="color" value="#7639A1" oninput="updateColor('accent', this.value)" />
              </div>
              <input class="color-hex" id="hex-accent" type="text" value="#7639A1" maxlength="7"

          <label for="consent-language">Consent Opt-In Language</label>
          <p class="field-hint" style="margin-bottom:4px;">To embed a link, use: <code>[link text](https://example.com)</code></p>
          <textarea id="consent-language" rows="6" placeholder="By signing up, I agree to receive communications from ..."></textarea>

      </section>

    </main>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
    }

    function updateColor(key, hex) {
      document.getElementById('swatch-' + key).style.background = hex;
      document.getElementById('hex-' + key).value = hex.toUpperCase();
    }

    function updateColorFromHex(key, value) {
      if (/^#[0-9A-Fa-f]{6}$/.test(value)) {
        document.getElementById('swatch-' + key).style.background = value;
        document.querySelector('#swatch-' + key + ' input[type=color]').value = value;
      }
    }
  </script>
